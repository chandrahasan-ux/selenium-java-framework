# ==========================================
# Application Configuration
# ==========================================

# Base URL — Target application
base.url=https://en.wikipedia.org/wiki/Main_Page

# Browser (chrome / firefox / edge)
browser=chrome

# Headless mode (true/false)
headless=false

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Environment
environment=QA
